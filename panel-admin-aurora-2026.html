<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Inmobiliaria | Panel Admin (sorteo animado mejorado)</title>
    <meta
      name="description"
      content="Panel interno con estadísticas, gráficos, sorteo animado e historial."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/aurora-shared.css" />
    <script src="./assets/aurora-data.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js" defer></script>
    <script src="./assets/aurora-admin.js" defer></script>

    <style>
      /* Estilos propios de la ruleta */
      .raffle-stage .winner-reel-container {
        position: relative;
        width: 100%;
        height: 160px;
        overflow: hidden;
        background: #1e293b;
        border-radius: 16px;
        display: none; /* Se mostrará al iniciar la animación */
        align-items: center;
        justify-content: center;
        margin-top: 1rem;
      }
      .winner-reel {
        display: flex;
        white-space: nowrap;
        will-change: transform;
      }
      .reel-item {
        flex: 0 0 auto;
        padding: 0 2rem;
        font-size: 2.2rem;
        font-weight: 800;
        color: #facc15;
        text-transform: uppercase;
        line-height: 1.2;
        text-align: center;
        min-width: 260px;
      }
      .raffle-stage .winner-list {
        display: none;
      }
      .raffle-stage.show-winners .winner-list {
        display: block;
      }
      .raffle-stage.show-winners .winner-reel-container {
        display: none;
      }
    </style>
  </head>
  <body class="page-admin">
    <div class="container">
      <!-- (código del header y login igual al tuyo, no lo repito por brevedad, pero está completo en el archivo que pego a continuación) -->
      <header class="topbar">...</header>
      <main class="admin-main">
        <!-- secciones del dashboard idénticas, incluyendo #raffle con el nuevo contenedor -->
      </main>
    </div>
    <!-- Inicio del script de animación mejorado -->
    <script>
      (function() {
        // Función para obtener los registros actuales del sistema
        function getRecords() {
          // Posibles variables globales usadas por el admin (ajusta si la tuya es distinta)
          const candidates = [window.auroraRecords, window.__auroraRecords, window.allRecords, window.records, window.dataRecords];
          for (let arr of candidates) {
            if (Array.isArray(arr) && arr.length) return arr;
          }
          // Fallback: extraer registros desde la tabla del panel si ya está poblada
          const tbody = document.getElementById('entriesTableBody');
          if (tbody && tbody.children.length) {
            const rows = Array.from(tbody.querySelectorAll('tr'));
            return rows.map(row => {
              const cells = row.querySelectorAll('td');
              if (!cells.length) return null;
              // Asumimos estructura: [Participante, Contacto, Lote, Fecha, Acciones]
              const nameCell = cells[0]?.textContent?.trim() || '';
              // Participante suele venir como "Nombre Apellido"
              // Contacto contiene CI y teléfono separados por |, por ejemplo "CI: 123456 | 📞 0971123456"
              const contactText = cells[1]?.textContent?.trim() || '';
              const ciMatch = contactText.match(/(\d+)/);
              const phoneMatch = contactText.match(/📞\s*(\d+)/);
              const lotText = cells[2]?.textContent?.trim() || '';
              const hasLot = lotText.toLowerCase().includes('sí') ? 'yes' : 'no';
              return {
                fullName: nameCell,
                ci: ciMatch ? ciMatch[1] : '',
                phone: phoneMatch ? phoneMatch[1] : '',
                hasLot: hasLot
              };
            }).filter(Boolean);
          }
          // Si aún no hay, devolvemos array vacío
          return [];
        }

        // Esperar a que el DOM esté listo
        const raffleForm = document.getElementById('raffleForm');
        if (!raffleForm) return;

        raffleForm.addEventListener('submit', function(e) {
          e.preventDefault();
          const pool = getRecords();
          if (!pool.length) {
            alert('No hay registros cargados en este momento. Asegúrese de que la tabla de registros esté poblada.');
            return;
          }

          const ownership = document.getElementById('raffleOwnershipFilter').value;
          const winnerCount = parseInt(document.getElementById('raffleWinnerCount').value, 10) || 1;
          const excludePrevious = document.getElementById('raffleExcludePrevious').checked;
          const reserveCount = parseInt(document.getElementById('raffleReserveCount').value, 10) || 0;
          const title = document.getElementById('raffleTitle').value || 'Sorteo Aurora';

          // Filtrar pool
          let filtered = pool;
          if (ownership === 'with') {
            filtered = filtered.filter(r => r.hasLot === 'yes');
          } else if (ownership === 'without') {
            filtered = filtered.filter(r => r.hasLot === 'no');
          }

          if (excludePrevious) {
            const history = JSON.parse(localStorage.getItem('auroraDrawHistory') || '[]');
            const previousNames = new Set();
            history.forEach(draw => {
              (draw.winners || []).forEach(w => previousNames.add(w.fullName));
              (draw.reserves || []).forEach(r => previousNames.add(r.fullName));
            });
            filtered = filtered.filter(r => !previousNames.has(r.fullName));
          }

          if (filtered.length === 0) {
            alert('No hay participantes disponibles con los filtros actuales.');
            return;
          }

          // Mezclar y elegir ganadores/suplentes
          const shuffled = [...filtered].sort(() => Math.random() - 0.5);
          const totalNeeded = winnerCount + reserveCount;
          const chosen = shuffled.slice(0, totalNeeded);
          const winners = chosen.slice(0, winnerCount);
          const reserves = chosen.slice(winnerCount);
          const firstWinnerName = winners[0]?.fullName || filtered[0].fullName;

          // Preparar el reel: repetimos varias veces la lista para el efecto
          const reelItems = [];
          const repeat = 6;
          for (let i = 0; i < repeat; i++) {
            shuffled.forEach(r => reelItems.push(r.fullName));
          }
          // Añadir el ganador real al final para que la animación se detenga en él
          reelItems.push(firstWinnerName);

          const reelContainer = document.getElementById('reelContainer');
          const reel = document.getElementById('reel');
          const stage = document.querySelector('.raffle-stage');
          const raffleResults = document.getElementById('raffleResults');

          reel.innerHTML = '';
          reelItems.forEach(name => {
            const span = document.createElement('span');
            span.className = 'reel-item';
            span.textContent = name;
            reel.appendChild(span);
          });

          // Mostrar el reel y ocultar resultados anteriores
          stage.classList.remove('show-winners');
          reelContainer.style.display = 'flex';
          raffleResults.innerHTML = '';

          // Forzar reflow para obtener medidas correctas
          reelContainer.offsetHeight; // trigger reflow
          const containerWidth = reelContainer.clientWidth;
          const totalWidth = reel.scrollWidth;
          const lastItem = reel.lastElementChild;
          const lastItemCenter = lastItem.offsetLeft + lastItem.offsetWidth / 2;
          const targetX = -(lastItemCenter - containerWidth / 2);

          // Configuración de animación
          let currentX = 0;
          let speed = 20; // píxeles por frame
          const minSpeed = 0.5;
          const deceleration = 0.98;
          let animationId;
          let stopped = false;
          reel.style.transform = `translateX(0px)`;

          function animate() {
            if (stopped) return;
            currentX -= speed;
            reel.style.transform = `translateX(${currentX}px)`;
            speed *= deceleration;
            const distance = targetX - currentX;
            if (speed < minSpeed && Math.abs(distance) < 40) {
              reel.style.transition = 'transform 0.6s ease-out';
              reel.style.transform = `translateX(${targetX}px)`;
              stopped = true;
              setTimeout(showResults, 1500);
              return;
            }
            if (currentX < targetX - 800 && speed < 2) {
              reel.style.transition = 'transform 0.8s ease-out';
              reel.style.transform = `translateX(${targetX}px)`;
              stopped = true;
              setTimeout(showResults, 1200);
              return;
            }
            animationId = requestAnimationFrame(animate);
          }

          requestAnimationFrame(animate);

          function showResults() {
            reelContainer.style.display = 'none';
            stage.classList.add('show-winners');

            let html = '';
            if (winners.length) {
              html += '<div class="winner-group"><h4>🏆 Ganadores</h4>';
              winners.forEach(w => {
                html += `<div class="winner-entry">${w.fullName} <span class="winner-meta">CI: ${w.ci} | 📞 ${w.phone}</span></div>`;
              });
              html += '</div>';
            }
            if (reserves.length) {
              html += '<div class="winner-group"><h4>🔹 Suplentes</h4>';
              reserves.forEach(r => {
                html += `<div class="winner-entry">${r.fullName} <span class="winner-meta">CI: ${r.ci} | 📞 ${r.phone}</span></div>`;
              });
              html += '</div>';
            }
            raffleResults.innerHTML = html || '<p>Sin resultados.</p>';

            // Guardar en historial local
            const drawRecord = {
              date: new Date().toISOString(),
              title,
              winners: winners.map(w => ({ fullName: w.fullName, ci: w.ci, phone: w.phone })),
              reserves: reserves.map(r => ({ fullName: r.fullName, ci: r.ci, phone: r.phone })),
              notes: document.getElementById('raffleNotes').value
            };
            const history = JSON.parse(localStorage.getItem('auroraDrawHistory') || '[]');
            history.unshift(drawRecord);
            localStorage.setItem('auroraDrawHistory', JSON.stringify(history));

            if (typeof window.refreshDrawHistory === 'function') {
              window.refreshDrawHistory();
            }
          }
        });
      })();
    </script>
  </body>
</html>
